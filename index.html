<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>수학 퀴즈</title>

<style>

body{
text-align:center;
font-family:Arial;
margin-top:80px;
}

#q{
font-size:40px;
margin-bottom:40px;
}

input{
font-size:25px;
padding:10px;
width:200px;
text-align:center;
}

button{
font-size:20px;
padding:10px 20px;
margin-top:20px;
}

#result{
margin-top:30px;
font-size:25px;
}

/* 분수 모양 */

.frac{
display:inline-block;
text-align:center;
font-size:40px;
}

.top{
border-bottom:2px solid black;
display:block;
padding:0 5px;
}

.bottom{
display:block;
}

</style>

</head>
<body>

<h1>수학 문제</h1>

<p id="q"></p>

<input id="answer" placeholder="답 입력">

<br>

<button onclick="check()">확인</button>

<p id="result"></p>

<button onclick="newQ()">다음 문제</button>

<script>

let answer

function rand(a,b){
return Math.floor(Math.random()*(b-a+1))+a
}

function newQ(){

let type=rand(1,4)

/* 거듭제곱근 */

if(type==1){

let n=rand(2,10)
let a=n*n*rand(2,5)

document.getElementById("q").innerText="√"+a+" 를 간단히 하면?"

answer=n+"√"+(a/(n*n))

}

/* 로그 */

if(type==2){

let base=rand(2,5)
let power=rand(2,4)

let num=Math.pow(base,power)

document.getElementById("q").innerText="log"+base+"("+num+") = ?"

answer=String(power)

}

/* 삼각함수 */

if(type==3){

let q="sin 30° = ?"

document.getElementById("q").innerHTML=
'sin 30° = <span class="frac"><span class="top">1</span><span class="bottom">2</span></span>'

answer="1/2"

}

/* 수열 */

if(type==4){

let a1=rand(1,10)
let d=rand(1,5)
let n=rand(5,10)

document.getElementById("q").innerText=
"등차수열 a₁="+a1+", d="+d+" 일 때 a"+n+" = ?"

answer=String(a1+(n-1)*d)

}

document.getElementById("answer").value=""
document.getElementById("result").innerText=""

}

function check(){

let user=document.getElementById("answer").value

if(user==answer){
document.getElementById("result").innerText="정답!"
}else{
document.getElementById("result").innerText="틀림 정답: "+answer
}

}

newQ()

</script>

</body>
</html>
