<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>мҲҳн•ҷ нҖҙмҰҲ</title>

<style>

body{
text-align:center;
font-family:Arial;
margin-top:60px;
}

#q{
font-size:40px;
margin-bottom:40px;
}

input{
font-size:25px;
padding:10px;
width:260px;
text-align:center;
}

button{
font-size:18px;
padding:10px 15px;
margin:5px;
}

#result{
margin-top:30px;
font-size:25px;
}

.topic button{
font-size:18px;
padding:10px 20px;
}

.math button{
font-size:20px;
padding:10px 15px;
}

</style>

</head>
<body>

<h1>мҲҳн•ҷ л¬ём ң</h1>

<div class="topic">

<button onclick="topic='root';newQ()">кұ°л“ӯм ңкіұк·ј</button>
<button onclick="topic='log';newQ()">лЎңк·ё</button>
<button onclick="topic='tri';newQ()">мӮјк°Ғн•ЁмҲҳ</button>
<button onclick="topic='seq';newQ()">мҲҳм—ҙ</button>

</div>

<p id="q"></p>

<input id="answer" placeholder="лӢө мһ…л Ҙ">

<br>

<div class="math">

<button onclick="add('вҲҡ')">вҲҡ</button>
<button onclick="add('ПҖ')">ПҖ</button>
<button onclick="add('sin')">sin</button>
<button onclick="add('cos')">cos</button>
<button onclick="add('tan')">tan</button>
<button onclick="add('^')">^</button>
<button onclick="add('/')">/</button>

</div>

<br>

<button onclick="check()">нҷ•мқё</button>

<p id="result"></p>

<button onclick="newQ()">лӢӨмқҢ л¬ём ң</button>

<script>

let answer
let topic="root"

function rand(a,b){
return Math.floor(Math.random()*(b-a+1))+a
}

function newQ(){

if(topic=="root"){

let n=rand(2,10)
let a=n*n*rand(2,5)

document.getElementById("q").innerText="вҲҡ"+a+" лҘј к°„лӢЁнһҲ н•ҳл©ҙ?"

answer=n+"вҲҡ"+(a/(n*n))

}

if(topic=="log"){

let base=rand(2,5)
let power=rand(2,4)

let num=Math.pow(base,power)

document.getElementById("q").innerText="log"+base+"("+num+") = ?"

answer=String(power)

}

if(topic=="tri"){

let arr=[
["sin30В°","1/2"],
["cos60В°","1/2"],
["tan45В°","1"],
["sin90В°","1"]
]

let p=arr[rand(0,arr.length-1)]

document.getElementById("q").innerText=p[0]+" = ?"

answer=p[1]

}

if(topic=="seq"){

let a1=rand(1,10)
let d=rand(1,5)
let n=rand(5,10)

document.getElementById("q").innerText=
"л“ұм°ЁмҲҳм—ҙ aвӮҒ="+a1+", d="+d+" мқј л•Ң a"+n+" = ?"

answer=String(a1+(n-1)*d)

}

document.getElementById("answer").value=""
document.getElementById("result").innerText=""

}

function add(s){

let input=document.getElementById("answer")
input.value+=s

}

function check(){

let user=document.getElementById("answer").value

if(user==answer){
document.getElementById("result").innerText="м •лӢө!"
}else{
document.getElementById("result").innerText="нӢҖлҰј м •лӢө: "+answer
}

}

newQ()

</script>

</body>
</html>
</body>
</html>
