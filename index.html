<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>수학 퀴즈</title>

<style>

body{
text-align:center;
font-family:Arial;
margin-top:60px;
}

#q{
font-size:38px;
margin-bottom:40px;
line-height:1.5;
}

input{
font-size:24px;
padding:10px;
width:260px;
text-align:center;
}

button{
font-size:18px;
padding:10px 15px;
margin:5px;
}

#result{
margin-top:30px;
font-size:24px;
}

.math button{
font-size:20px;
padding:10px 15px;
}

</style>

</head>
<body>

<h1>수학 문제</h1>

<p id="q"></p>

<input id="answer" placeholder="답 입력">

<br>

<div class="math">

<button onclick="add('√')">√</button>
<button onclick="add('π')">π</button>
<button onclick="add('sin')">sin</button>
<button onclick="add('cos')">cos</button>
<button onclick="add('tan')">tan</button>
<button onclick="add('^')">^</button>
<button onclick="add('/')">/</button>

</div>

<br>

<button onclick="check()">확인</button>

<p id="result"></p>

<button onclick="newQ()">다음 문제</button>

<script>

let answer

function rand(a,b){
return Math.floor(Math.random()*(b-a+1))+a
}

function newQ(){

let type=rand(1,6)

/* 루트 문제 */

if(type==1){

let n=rand(2,10)
let a=n*n*rand(2,6)

document.getElementById("q").innerText=
"√"+a+" 를 간단히 하여라."

answer=n+"√"+(a/(n*n))

}

/* 로그 문제 */

if(type==2){

let base=rand(2,5)
let power=rand(2,5)

let num=Math.pow(base,power)

document.getElementById("q").innerText=
"log"+base+"("+num+") 의 값은?"

answer=String(power)

}

/* 삼각함수 */

if(type==3){

let list=[
["sin30°","1/2"],
["cos60°","1/2"],
["tan45°","1"],
["sin90°","1"]
]

let p=list[rand(0,list.length-1)]

document.getElementById("q").innerText=
p[0]+" 의 값은?"

answer=p[1]

}

/* 수열 */

if(type==4){

let a1=rand(1,10)
let d=rand(1,5)
let n=rand(5,10)

document.getElementById("q").innerText=
"등차수열에서 a₁="+a1+", d="+d+" 이다. a"+n+" 의 값을 구하여라."

answer=String(a1+(n-1)*d)

}

/* 삼각형 문제 */

if(type==5){

let a=rand(3,10)
let b=rand(3,10)

document.getElementById("q").innerText=
"직각삼각형에서 두 변의 길이가 "+a+", "+b+" 일 때 빗변의 길이는?"

answer="√"+(a*a+b*b)

}

/* 조건 여러개 문제 */

if(type==6){

let a=rand(1,5)
let b=rand(1,5)

document.getElementById("q").innerText=
"f(x)=x²+"+a+"x+"+b+" 일 때 f(1)의 값을 구하여라."

answer=String(1+a+b)

}

document.getElementById("answer").value=""
document.getElementById("result").innerText=""

}

function add(s){

let input=document.getElementById("answer")
input.value+=s

}

function check(){

let user=document.getElementById("answer").value

if(user==answer){
document.getElementById("result").innerText="정답!"
}else{
document.getElementById("result").innerText="틀림 정답: "+answer
}

}

newQ()

</script>

</body>
</html>
