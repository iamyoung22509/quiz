// 수학 입력 버튼

// 랜덤 함수

  {type:"seq", q:"등차수열 a₁=2, d=3, n=7일 때 aₙ 값을 구하시오.", a:"20"}
];

// 문제 생성
function newQ(){
  selectedUnit=document.getElementById("unit").value;
  document.getElementById("answer").value="";
  document.getElementById("result").innerText="";
  let unitProblems = problems.filter(p=>p.type===selectedUnit);
  let p = unitProblems[rand(0,unitProblems.length-1)];
  document.getElementById("q").innerText=p.q;
  answer=p.a;
}

// 정답 확인
function check(){
  let user=document.getElementById("answer").value;
  document.getElementById("result").innerText=(user==answer)?"정답!":"틀림 정답: "+answer;
}

// 초기 문제
newQ();
</script>
