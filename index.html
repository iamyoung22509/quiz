<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>수학 문제</title>
<style>
body{font-family:Arial;margin:20px;}
.container{display:flex;justify-content:space-between;margin-bottom:20px;}
.topic, .level{text-align:center;}
#mainContent{display:flex;justify-content:center;align-items:flex-start;gap:20px;}
.problemArea{width:500px;text-align:center;}
#q{font-size:28px;margin-bottom:10px;line-height:1.4;}
#answer{font-size:22px;padding:6px;width:280px;text-align:center;display:block;margin:10px auto;}
.math{text-align:center;margin:10px 0;}
#result{text-align:center;font-size:22px;margin-top:15px;}
canvas{border:1px solid black;width:400px;height:300px;cursor:crosshair;}
</style>
</head>
<body>

<h1 style="text-align:center;">수학 문제</h1>

<div class="container">
  <div class="topic">
    <b>단원 선택:</b><br>
    <button onclick="topic='root'; newQ()">거듭제곱근</button>
    <button onclick="topic='log'; newQ()">로그</button>
    <button onclick="topic='tri'; newQ()">삼각함수</button>
    <button onclick="topic='seq'; newQ()">수열</button>
    <button onclick="topic='triangle'; newQ()">삼각형 도형</button>
  </div>
  <div class="level">
    <b>난이도:</b><br>
    <button onclick="level=1; newQ()">1</button>
    <button onclick="level=2; newQ()">2</button>
    <button onclick="level=3; newQ()">3</button>
  </div>
</div>

<div id="mainContent">
  <div class="problemArea">
    <p id="q"></p>
    <input id="answer" placeholder="답 입력">
    <div class="math">
      <button onclick="add('√')">√</button>
      <button onclick="add('³√')">³√</button>
      <button onclick="add('π')">π</button>
      <button onclick="add('sin')">sin</button>
      <button onclick="add('cos')">cos</button>
      <button onclick="add('tan')">tan</button>
      <button onclick="add('^')">^</button>
      <button onclick="add('/')">/</button>
    </div>
    <button onclick="check()">확인</button>
    <button onclick="newQ()">다음 문제</button>
    <p id="result"></p>
  </div>

  <div>
    <canvas id="canvas"></canvas><br>
    <button onclick="clearCanvas()">풀이 지우기</button>
  </div>
</div>

<script>
let topic='root', level=1, answer;

// 랜덤
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

// 문제 생성
function newQ(){
  document.getElementById("answer").value="";
  document.getElementById("result").innerText="";

  let qtext="", ans="";

  // 고난도 조건 문제 예시
  if(topic=='root' && level>=2){
    let aMin=20,aMax=50;
    let bMin=60,bMax=150;
    let validPairs=[];
    for(let a=aMin;a<=aMax;a++){
      for(let b=bMin;b<=bMax;b++){
        let val=Math.sqrt(a)+Math.cbrt(b);
        if(Number.isInteger(val)) validPairs.push([a,b,val]);
      }
    }
    if(validPairs.length>0){
      let maxPair=validPairs.reduce((prev,curr)=>curr[0]+curr[1]>prev[0]+prev[1]?curr:prev,[0,0,0]);
      qtext=`20 ≤ a ≤ 50, 60 ≤ b ≤ 150 일때 √a + ³√b 가 자연수가 되도록 하는 a,b에 대하여 a+b의 최댓값을 구하시오.`;
      ans=String(maxPair[0]+maxPair[1]);
    }else{
      qtext="조건을 만족하는 a,b가 없습니다. (예시)";
      ans="예시 없음";
    }
  }
  else{
    // 일반 난이도 문제
    if(topic=='root'){
      let n=rand(2,10*level);
      qtext="√"+(n*n)+" 를 간단히 하여라.";
      ans=String(n);
    }
    if(topic=='log'){
      let base=rand(2,5);
      let power=rand(2,3+level);
      let num=Math.pow(base,power);
      qtext="log"+base+"("+num+") 의 값은?";
      ans=String(power);
    }
    if(topic=='tri'){
      let list=[
        ["sin30°","1/2"],
        ["cos60°","1/2"],
        ["tan45°","1"],
        ["sin60°","√3/2"]
      ]
      let p=list[rand(0,list.length-1)];
      qtext=p[0]+" 의 값은?";
      ans=p[1];
    }
    if(topic=='seq'){
      if(rand(1,2)==1){
        let a1=rand(1,5*level); let d=rand(1,5*level); let n=rand(3,6);
        qtext="등차수열 a₁="+a1+", d="+d+" 일 때 a"+n+" 값을 구하라.";
        ans=String(a1+(n-1)*d);
      } else{
        let a1=rand(1,5*level); let r=rand(2,3); let n=rand(3,5);
        qtext="등비수열 a₁="+a1+", r="+r+" 일 때 a"+n+" 값을 구하라.";
        ans=String(a1*Math.pow(r,n-1));
      }
    }
    if(topic=='triangle'){
      let a=rand(3,10*level), b=rand(3,10*level);
      if(rand(1,2)==1){
        qtext="직각삼각형 두 변 "+a+", "+b+" 일 때 빗변 길이?";
        let c=Math.sqrt(a*a+b*b);
        let cInt=Math.round(c);
        ans=(cInt*cInt==(a*a+b*b))? String(cInt):"√"+(a*a+b*b);
      } else{
        let angle=[30,45,60][rand(0,2)];
        let h=Math.round(a*Math.sin(angle*Math.PI/180));
        qtext="직각삼각형 한 변 "+a+", 각 θ="+angle+"° 높이 h?";
        ans=String(h);
      }
    }
  }

  document.getElementById("q").innerText=qtext;
  answer=ans;
}

// 수학 입력 버튼
function add(s){document.getElementById("answer").value+=s}

// 정답 확인
function check(){
  let user=document.getElementById("answer").value;
  document.getElementById("result").innerText=(user==answer)?"정답!":"틀림 정답: "+answer;
}

// 그림판
let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");
let drawing=false;
canvas.onmousedown=e=>{drawing=true; ctx.beginPath(); ctx.moveTo(e.offsetX,e.offsetY);}
canvas.onmousemove=e=>{if(drawing){ctx.lineTo(e.offsetX,e.offsetY); ctx.stroke();}}
canvas.onmouseup=e=>{drawing=false;}
function clearCanvas(){ctx.clearRect(0,0,canvas.width,canvas.height);}

newQ();
</script>
</body>
</html>
</body>
</html>
